name: python tests+artifacts+release

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches:
    - "*"

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.action == 'closed'
      && format('release-pr-{0}', github.event.pull_request.number)
      || github.event.pull_request.number
      || github.ref
    }}
  cancel-in-progress: true

permissions: {}

env:
  FORCE_COLOR: 1

jobs:

  create-draft-releases:
    # Only run when a release PR is merged to main with release labels.
    # Creates draft GitHub releases + tags; downstream jobs build, test,
    # then publish the drafts after all checks pass.
    if: |
      github.repository == 'pypa/setuptools-scm' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      (contains(github.event.pull_request.labels.*.name, 'release:setuptools-scm') ||
       contains(github.event.pull_request.labels.*.name, 'release:vcs-versioning'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_scm: ${{ steps.create-releases.outputs.release_scm }}
      release_vcs: ${{ steps.create-releases.outputs.release_vcs }}
      scm_release_id: ${{ steps.create-releases.outputs.scm_release_id }}
      vcs_release_id: ${{ steps.create-releases.outputs.vcs_release_id }}
      scm_tag: ${{ steps.create-releases.outputs.scm_tag }}
      vcs_tag: ${{ steps.create-releases.outputs.vcs_tag }}
    steps:
      - name: Create draft releases and tags
        id: create-releases
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const prTitle = pr.title;
            const mergeCommitSha = pr.merge_commit_sha;
            const labels = pr.labels.map(l => l.name);

            console.log(`Processing PR #${pr.number}: ${prTitle}`);
            console.log(`Merge commit: ${mergeCommitSha}`);
            console.log(`Labels: ${labels.join(', ')}`);

            function extractVersion(title, packageName) {
              const regex = new RegExp(`${packageName} v(\\d+\\.\\d+\\.\\d+)`);
              const match = title.match(regex);
              return match ? match[1] : null;
            }

            async function extractChangelog(packageDir, version) {
              try {
                const { data: file } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: `${packageDir}/CHANGELOG.md`,
                  ref: mergeCommitSha
                });

                const content = Buffer.from(file.content, 'base64').toString('utf-8');
                const lines = content.split('\n');

                let inSection = false;
                let changelog = [];

                for (const line of lines) {
                  if (line.startsWith(`## ${version}`)) {
                    inSection = true;
                    continue;
                  }
                  if (inSection && line.match(/^## \d/)) {
                    break;
                  }
                  if (inSection) {
                    changelog.push(line);
                  }
                }

                while (changelog.length > 0 && changelog[0].trim() === '') {
                  changelog.shift();
                }
                while (changelog.length > 0 && changelog[changelog.length - 1].trim() === '') {
                  changelog.pop();
                }

                return changelog.join('\n');
              } catch (error) {
                console.log(`Could not extract changelog: ${error.message}`);
                return `Release ${version}`;
              }
            }

            // createRelease with target_commitish automatically creates a
            // lightweight tag if it doesn't already exist
            async function createDraftRelease(packageName, packageDir, tagPrefix) {
              const version = extractVersion(prTitle, packageName);
              if (!version) {
                throw new Error(`Failed to extract ${packageName} version from PR title: ${prTitle}`);
              }

              const tagName = `${tagPrefix}-v${version}`;

              // Guard against duplicate releases (e.g. workflow re-run)
              try {
                const { data: existing } = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: tagName
                });
                if (existing) {
                  console.log(`Release ${tagName} already exists (id: ${existing.id}, draft: ${existing.draft})`);
                  return { tagName, version, releaseId: existing.id };
                }
              } catch (e) {
                if (e.status !== 404) throw e;
                // 404 = no existing release, proceed to create
              }

              const changelog = await extractChangelog(packageDir, version);

              console.log(`Creating draft release ${tagName} at ${mergeCommitSha}`);

              const { data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                target_commitish: mergeCommitSha,
                name: `${packageName} v${version}`,
                body: changelog,
                draft: true,
                prerelease: false,
                make_latest: 'legacy'
              });

              console.log(`Draft release created: ${release.html_url} (id: ${release.id})`);
              return { tagName, version, releaseId: release.id };
            }

            if (labels.includes('release:setuptools-scm')) {
              console.log('\n--- Processing setuptools-scm ---');
              const result = await createDraftRelease('setuptools-scm', 'setuptools-scm', 'setuptools-scm');
              core.setOutput('release_scm', 'true');
              core.setOutput('scm_release_id', String(result.releaseId));
              core.setOutput('scm_tag', result.tagName);
            } else {
              core.setOutput('release_scm', 'false');
            }

            if (labels.includes('release:vcs-versioning')) {
              console.log('\n--- Processing vcs-versioning ---');
              const result = await createDraftRelease('vcs-versioning', 'vcs-versioning', 'vcs-versioning');
              core.setOutput('release_vcs', 'true');
              core.setOutput('vcs_release_id', String(result.releaseId));
              core.setOutput('vcs_tag', result.tagName);
            } else {
              core.setOutput('release_vcs', 'false');
            }

            const released = [];
            if (labels.includes('release:setuptools-scm')) released.push('setuptools-scm');
            if (labels.includes('release:vcs-versioning')) released.push('vcs-versioning');
            await core.summary
              .addHeading('Draft Releases Created')
              .addList(released.map(p => `${p} (draft)`))
              .write();

  package:
    needs: [create-draft-releases]
    # Run on CI events (PR open/sync/push) even when create-draft-releases is
    # skipped. On PR close, only run if draft releases were created (release flow).
    if: |
      !cancelled() &&
      (github.event.action != 'closed' || needs.create-draft-releases.result == 'success')
    name: Build & inspect ${{ matrix.package }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        package:
          - vcs-versioning
          - setuptools-scm
    env:
      # Use no-local-version for package builds to ensure clean versions for PyPI uploads
      SETUPTOOLS_SCM_NO_LOCAL: "1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build ${{ matrix.package }}
        uses: hynek/build-and-inspect-python-package@f3d069d0f9a3c9169d1a483318bb0e09876a6fd6 # v2.15.0
        with:
          path: ${{ matrix.package }}
          upload-name-suffix: -${{ matrix.package }}

  test:
    needs: [package]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python_version: [ '3.10', '3.11', '3.12', '3.13', 'pypy-3.10' ]
        os: [windows-latest, ubuntu-latest] #, macos-latest]
        include:
        - os: windows-latest
          python_version: 'msys2'
    env:
      # Enable tracemalloc to debug gc errors with popen objects (especially on Windows)
      PYTHONTRACEMALLOC: "1"

    name: ${{ matrix.os }} - Python ${{ matrix.python_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: matrix.python_version != 'msys2'
        with:
          python-version: ${{ matrix.python_version }}
          architecture: x64
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Setup MSYS2
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d # v2.31.0
        if: matrix.python_version == 'msys2'
        with:
          msystem: MINGW64
          install: git mingw-w64-x86_64-python mingw-w64-x86_64-python-setuptools
          update: true
      - name: Setup GnuPG and Mercurial on Windows
        # At present, the Windows VMs only come with the copy of GnuPG that's bundled
        # with Git for Windows. If we want to use this version _and_ be able to set
        # arbitrary GnuPG home directories, then the test would need to figure out when
        # to convert Windows-style paths into Unix-style paths with cygpath, which is
        # unreasonable.
        #
        # Instead, we'll install a version of GnuPG that can handle Windows-style paths.
        # However, due to <https://dev.gnupg.org/T5593>, installation fails if the PATH
        # environment variable is too long. Consequently, we need to shorten PATH to
        # something minimal before we can install GnuPG. For further details, see
        # <https://github.com/actions/virtual-environments/issues/2876>.
        #
        # Additionally, we'll explicitly set `gpg.program` to ensure Git for Windows
        # doesn't invoke the bundled GnuPG, otherwise we'll run into
        # <https://dev.gnupg.org/T5504>. See also: <https://dev.gnupg.org/T3020>.
        #
        # Windows runners no longer ship with Mercurial pre-installed, so we install
        # it via Chocolatey using the 'hg' package.
        run: |
          $env:PATH = "C:\Program Files\Git\bin;C:\Windows\system32;C:\Windows;C:\Windows\System32\Wbem;C:\Windows\System32\WindowsPowerShell\v1.0\;C:\ProgramData\Chocolatey\bin"
          [Environment]::SetEnvironmentVariable("Path", $env:PATH, "Machine")
          choco install gnupg hg -y --no-progress
          echo "C:\Program Files\gnupg\bin" >> $env:GITHUB_PATH
          echo "C:\Program Files\Mercurial\" >> $env:GITHUB_PATH
          git config --system gpg.program "C:\Program Files\gnupg\bin\gpg.exe"
        if: runner.os == 'Windows'
      - run: uv sync --all-packages --all-groups
      - name: Download vcs-versioning packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages-vcs-versioning
          path: dist
      - name: Download setuptools-scm packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages-setuptools-scm
          path: dist
      - name: Install built wheels
        shell: bash
        run: |
          # Install vcs-versioning first (dependency of setuptools-scm)
          uv pip install dist/vcs_versioning-*.whl
          # Then install setuptools-scm
          uv pip install dist/setuptools_scm-*.whl
      - run: |
          $(hg debuginstall --template "{pythonexe}") -m pip install hg-git --user
        if: matrix.os == 'ubuntu-latest'
      # this hopefully helps with os caches, hg init sometimes gets 20s timeouts
      - run: hg version
        shell: bash
      - name: Run tests for both packages
        run: uv run --no-sync pytest setuptools-scm/testing_scm/ vcs-versioning/testing_vcs/
        timeout-minutes: 25

  publish-vcs-versioning:
    runs-on: ubuntu-latest
    needs: [test, create-draft-releases]
    if: needs.create-draft-releases.outputs.release_vcs == 'true'
    permissions:
      id-token: write
      contents: write
    steps:
    - name: Download vcs-versioning packages
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: Packages-vcs-versioning
        path: dist
    - name: Publish vcs-versioning to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
    - name: Upload release assets and publish
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        RELEASE_ID: ${{ needs.create-draft-releases.outputs.vcs_release_id }}
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const releaseId = parseInt(process.env.RELEASE_ID);
          if (!releaseId) throw new Error('RELEASE_ID is not set');

          const contentTypes = {
            '.whl': 'application/zip',
            '.gz': 'application/gzip',
            '.zip': 'application/zip',
          };

          for (const file of fs.readdirSync('dist')) {
            const ext = file.endsWith('.tar.gz') ? '.gz' : path.extname(file);
            const filePath = path.join('dist', file);
            const data = fs.readFileSync(filePath);
            console.log(`Uploading ${file} (${data.length} bytes)`);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: file,
              data: data,
              headers: { 'content-type': contentTypes[ext] || 'application/octet-stream' }
            });
          }

          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: releaseId,
            draft: false,
            make_latest: 'legacy'
          });
          console.log('vcs-versioning release published');

  publish-setuptools-scm:
    runs-on: ubuntu-latest
    # Depends on publish-vcs-versioning so the dependency is on PyPI first
    needs: [publish-vcs-versioning, create-draft-releases]
    if: |
      !cancelled() && !failure() &&
      needs.create-draft-releases.outputs.release_scm == 'true'
    permissions:
      id-token: write
      contents: write
    steps:
    - name: Download setuptools-scm packages
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: Packages-setuptools-scm
        path: dist
    - name: Publish setuptools-scm to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
    - name: Upload release assets and publish
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        RELEASE_ID: ${{ needs.create-draft-releases.outputs.scm_release_id }}
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const releaseId = parseInt(process.env.RELEASE_ID);
          if (!releaseId) throw new Error('RELEASE_ID is not set');

          const contentTypes = {
            '.whl': 'application/zip',
            '.gz': 'application/gzip',
            '.zip': 'application/zip',
          };

          for (const file of fs.readdirSync('dist')) {
            const ext = file.endsWith('.tar.gz') ? '.gz' : path.extname(file);
            const filePath = path.join('dist', file);
            const data = fs.readFileSync(filePath);
            console.log(`Uploading ${file} (${data.length} bytes)`);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: file,
              data: data,
              headers: { 'content-type': contentTypes[ext] || 'application/octet-stream' }
            });
          }

          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: releaseId,
            draft: false,
            make_latest: 'legacy'
          });
          console.log('setuptools-scm release published');

  cleanup-draft-releases:
    # Delete draft releases and their tags if the pipeline failed, so a re-run
    # of the release PR merge (or a fix commit) starts from a clean state.
    needs: [create-draft-releases, publish-vcs-versioning, publish-setuptools-scm]
    if: |
      always() &&
      needs.create-draft-releases.result == 'success' &&
      (needs.publish-vcs-versioning.result == 'failure' ||
       needs.publish-setuptools-scm.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete failed draft releases
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          VCS_RELEASE_ID: ${{ needs.create-draft-releases.outputs.vcs_release_id }}
          SCM_RELEASE_ID: ${{ needs.create-draft-releases.outputs.scm_release_id }}
          VCS_TAG: ${{ needs.create-draft-releases.outputs.vcs_tag }}
          SCM_TAG: ${{ needs.create-draft-releases.outputs.scm_tag }}
        with:
          script: |
            async function deleteDraftRelease(releaseId, tagName) {
              if (!releaseId) return;
              const id = parseInt(releaseId);

              try {
                const { data: release } = await github.rest.repos.getRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: id
                });

                if (!release.draft) {
                  console.log(`Release ${tagName} is already published, skipping cleanup`);
                  return;
                }

                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: id
                });
                console.log(`Deleted draft release ${tagName} (id: ${id})`);

                if (tagName) {
                  try {
                    await github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `tags/${tagName}`
                    });
                    console.log(`Deleted tag ${tagName}`);
                  } catch (e) {
                    console.log(`Could not delete tag ${tagName}: ${e.message}`);
                  }
                }
              } catch (error) {
                console.log(`Could not clean up release ${tagName}: ${error.message}`);
              }
            }

            await deleteDraftRelease(process.env.VCS_RELEASE_ID, process.env.VCS_TAG);
            await deleteDraftRelease(process.env.SCM_RELEASE_ID, process.env.SCM_TAG);

            await core.summary
              .addHeading('Draft Release Cleanup')
              .addRaw('Draft releases were cleaned up due to pipeline failure. Fix the issue and re-merge or re-run.')
              .write();

  test-pypi-upload:
    runs-on: ubuntu-latest
    if: |
      github.repository == 'pypa/setuptools-scm' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: [test]
    permissions:
      id-token: write
    steps:
    - name: Download vcs-versioning packages
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: Packages-vcs-versioning
        path: dist
    - name: Download setuptools-scm packages
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: Packages-setuptools-scm
        path: dist
    - name: Publish package to PyPI
      continue-on-error: true
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
      with:
        repository-url: https://test.pypi.org/legacy/
